# Cloudflare Pages Configuration for Next.js
# This file is used for Cloudflare Pages deployment

name = "jtvm"
compatibility_date = "2024-01-01"

# For Next.js on Cloudflare Pages, the build output is handled automatically
# Build command: npm run build
# Build output directory: .next
# Node version: 18 or higher

[env.production]
name = "jtvm"

[env.preview]
name = "jtvm-preview"

